<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OpenAlex Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  ./styles.css
</head>
<body>
  <header class="container">
    <h1>OpenAlex Search</h1>
    <p class="muted">Search scholarly works; filter by source type, results per page, sort; then apply OA/fulltext/abstract.</p>
  </header>

  <main class="container">
    <form id="search-form" class="card">
      <!-- Query -->
      <div class="row">
        <label for="q">Query</label>
        <input id="q" name="q" type="search"
               placeholder="e.g., humanitarian logistics refugee partnerships" required />
      </div>

      <!-- ▼▼ All drop-downs FIRST ▼▼ -->
      <div class="row two">
        <div>
          <label for="sourceType">Source type</label>
          <select id="sourceType">
            <option value="">Any</option>
            <option value="journal">Journal</option>
            <option value="repository">Repository</option>
            <option value="conference">Conference</option>
            <option value="book series">Book series</option>
            <option value="ebook platform">eBook platform</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div>
          <label for="per">Results per page</label>
          <select id="per">
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>

      <div class="row two">
        <div>
          <label for="sort">Sort by</label>
          <select id="sort">
            <option value="cited_by_count:desc" selected>Most cited</option>
            <option value="publication_date:desc">Newest</option>
            <option value="publication_date:asc">Oldest</option>
          </select>
        </div>
        <div></div><!-- spacer to keep grid balanced -->
      </div>
      <!-- ▲▲ All drop-downs FIRST ▲▲ -->

      <!-- ▼▼ Then all checkboxes ▼▼ -->
      <div class="row two">
        <div class="checkbox">
          <label><input id="oa" type="checkbox" /> Open Access only</label>
        </div>
        <div class="checkbox">
          <label><input id="hasFulltext" type="checkbox" /> Has fulltext</label>
        </div>
      </div>

      <div class="row">
        <div class="checkbox">
          <label><input id="hasAbstract" type="checkbox" /> Has abstract</label>
        </div>
      </div>
      <!-- ▲▲ Then all checkboxes ▲▲ -->

      <!-- Year (text/range) comes after the checkboxes -->
      <div class="row">
        <label for="year">Year (single or range)</label>
        <input id="year" name="year" type="text" placeholder="2020-2026 or 2024" />
      </div>

      <div class="actions">
        <button type="submit" class="btn">Search</button>
        <button type="button" id="clear" class="btn secondary">Clear</button>
      </div>
    </form>

    <section class="meta" id="meta"></section>
    <section id="results" class="list"></section>

    <nav id="pager" class="pager hidden">
      <button id="prev" class="btn secondary">◀ Prev</button>
      <span id="page-status" class="muted"></span>
      <button id="next" class="btn secondary">Next ▶</button>
    </nav>
  </main>

  <footer class="container muted small">
    Data via <a href="https://openalex.org" target="_blank" rel="noopener">OpenAlex</a> (CC0).
  </footer>

  <!-- Config first, then app -->
  ./config.js</script>
  ./app.js</script>
</body>
</html>
